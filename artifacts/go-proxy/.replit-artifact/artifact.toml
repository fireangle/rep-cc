kind = "api"
previewPath = "/"
title = "Go Proxy"
version = "1.0.0"

[[services]]
localPort = 8000
name = "Go Proxy"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/go-proxy run dev"

[services.production]
run = "pnpm --filter @workspace/go-proxy run start"
build = "pnpm --filter @workspace/go-proxy run build"

[services.production.env]
PORT = "8000"

[services.production.health.startup]
path = "/health"
