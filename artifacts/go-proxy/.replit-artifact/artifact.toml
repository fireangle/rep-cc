kind = "api"
previewPath = "/"
title = "Go Proxy"
version = "1.0.0"

[[services]]
localPort = 8000
name = "Go Proxy"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace/artifacts/go-proxy && PORT=8000 go run ."

[services.production]
run = "cd /home/runner/workspace/artifacts/go-proxy && exec ./proxy"
build = "cd /home/runner/workspace/artifacts/go-proxy && go build -o proxy ."

[services.production.env]
PORT = "8000"

[services.production.health.startup]
path = "/health"
